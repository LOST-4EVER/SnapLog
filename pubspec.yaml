name: snaplog
description: "SnapLog Pro - A professional-grade daily photo-journaling application."
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  sqflite: ^2.3.3+3
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
