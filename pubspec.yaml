name: snaplog
description: "SnapLog Pro - A professional-grade daily photo-journaling application."
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  sqflite: ^2.3.3+3
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  share_plus: ^10.0.0
  flutter_image_compress: ^2.3.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  quick_actions: ^1.0.9
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  dynamic_color: ^1.7.0
  speech_to_text: ^7.0.0
  local_auth: ^2.3.0
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "icon/play_store_512.png"
  min_sdk_android: 21 # android min sdk min:16, default:21

flutter:
  uses-material-design: true
